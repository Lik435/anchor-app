<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anchor</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFFFFF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --surface: #F7F7F5;
    --border: #E5E5E1;
    --text: #1A1A1A;
    --text-dim: #6E6E6E;
    --accent: #B8935A;
    --accent-soft: #F1E8DA;
    --user-bubble: #F0F0EE;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  /* HEADER */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-mark {
    width: 26px; height: 26px;
    background: var(--text);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .brand-mark svg { width: 14px; height: 14px; }
  .brand h1 { font-size: 16px; font-weight: 600; margin: 0; }
  .header-actions { display: flex; align-items: center; gap: 14px; }
  .header-actions button {
    background: none; border: none; color: var(--text-dim);
    font-size: 13px; font-weight: 500; cursor: pointer; padding: 0;
  }

  /* STREAK */
  .streak-bar {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 20px 0;
  }
  .streak-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border);
  }
  .streak-dot.filled { background: var(--accent); }
  .streak-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-left: auto;
    letter-spacing: 0.03em;
  }

  /* NAV */
  nav {
    display: flex;
    padding: 0 20px;
    gap: 4px;
    margin-top: 12px;
    border-bottom: 1px solid var(--border);
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  nav button.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }

  .screen { display: none; flex: 1; flex-direction: column; padding: 20px; }
  .screen.active { display: flex; }

  /* CHAT — ChatGPT style: assistant = plain text, no bubble */
  #chatLog {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    padding-bottom: 16px;
  }
  .msg { display: flex; }
  .msg.assistant { justify-content: flex-start; }
  .msg.user { justify-content: flex-end; }
  .msg-text {
    font-size: 14.5px;
    line-height: 1.6;
    max-width: 88%;
  }
  .msg.assistant .msg-text {
    color: var(--text);
    padding: 0;
  }
  .msg.user .msg-text {
    background: var(--user-bubble);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 14px;
  }

  .chat-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 6px;
    border: 1px solid var(--border);
    border-radius: 24px;
    margin-top: 12px;
  }
  .chat-input-row input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    padding: 6px 10px;
    font-family: var(--font-body);
    font-size: 14px;
  }
  .chat-input-row input:focus { outline: none; }
  .chat-input-row button {
    background: var(--text);
    color: var(--bg);
    border: none;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* CHECK-IN */
  .checkin-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-top: 8px;
  }
  .checkin-card .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .checkin-card p {
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--text);
    margin: 0 0 18px;
  }
  .checkin-card button {
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 11px 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
    width: 100%;
  }

  /* MOOD */
  .mood-prompt {
    font-size: 15.5px;
    font-weight: 500;
    text-align: center;
    margin: 8px 0 22px;
  }
  .mood-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 26px;
  }
  .mood-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 58px; height: 58px;
    border-radius: 16px;
    font-size: 24px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .mood-btn:hover { border-color: var(--accent); }
  .mood-history-title {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .mood-entry {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }
  .empty-state {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 20px 0;
  }

  /* KEY MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    align-items: center; justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--bg);
    border-radius: 16px;
    padding: 24px;
    max-width: 340px;
    width: 100%;
  }
  .modal-box h3 { margin: 0 0 8px; font-size: 15px; }
  .modal-box p { margin: 0 0 16px; font-size: 13px; color: var(--text-dim); }
  .modal-box input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    margin-bottom: 14px;
  }
  .modal-box button {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 11px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">

  <div class="app-header">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="6" r="2.5"/>
          <line x1="12" y1="8.5" x2="12" y2="18"/>
          <line x1="8" y1="10.5" x2="16" y2="10.5"/>
          <path d="M 6 14 Q 6 18 12 18 Q 18 18 18 14"/>
        </svg>
      </div>
      <h1>Anchor</h1>
    </div>
    <div class="header-actions">
      <button onclick="openKeyModal()">Key</button>
    </div>
  </div>

  <div class="streak-bar" id="streakBar"></div>

  <nav>
    <button class="nav-btn active" data-screen="chatScreen">Chat</button>
    <button class="nav-btn" data-screen="checkinScreen">Check-in</button>
    <button class="nav-btn" data-screen="moodScreen">Mood</button>
  </nav>

  <div id="chatScreen" class="screen active">
    <div id="chatLog"></div>
    <div class="chat-input-row">
      <input id="chatInput" placeholder="Message Anchor..." />
      <button onclick="sendMessage()">↑</button>
    </div>
  </div>

  <div id="checkinScreen" class="screen">
    <div class="checkin-card">
      <div class="eyebrow">Today's check-in</div>
      <p id="checkinText">Tap below and Anchor will check in on you, based on how things have been going.</p>
      <button onclick="getCheckin()">Get today's check-in</button>
    </div>
  </div>

  <div id="moodScreen" class="screen">
    <div class="mood-prompt">How are you feeling right now?</div>
    <div class="mood-row">
      <button class="mood-btn" onclick="logMood('good','🙂')">🙂</button>
      <button class="mood-btn" onclick="logMood('okay','😐')">😐</button>
      <button class="mood-btn" onclick="logMood('bad','😔')">😔</button>
    </div>
    <div class="mood-history-title">Last 14 entries</div>
    <div id="moodHistory"></div>
  </div>

</div>

<div class="modal-overlay" id="keyModal">
  <div class="modal-box">
    <h3>Gemini API Key</h3>
    <p>Get a free key at aistudio.google.com/apikey. Stored only on this device.</p>
    <input id="apiKeyInput" placeholder="Paste your API key" />
    <button onclick="saveKey()">Save</button>
  </div>
</div>

<script>
// ================= CONFIG =================
const NICHE_CONTEXT = "a student preparing for exams and job interviews, currently feeling the pressure of both.";
const MODEL_NAME = "gemini-3.5-flash";

// ================= STORAGE =================
const store = {
  get(key, fallback) {
    try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
    catch { return fallback; }
  },
  set(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
};

let messages = store.get("anchor_messages", []);
let moods = store.get("anchor_moods", []);
let streakDates = store.get("anchor_streak", []);
let apiKey = store.get("anchor_api_key", "");

// ================= KEY MODAL =================
function openKeyModal() {
  document.getElementById("apiKeyInput").value = apiKey;
  document.getElementById("keyModal").classList.add("active");
}
function saveKey() {
  apiKey = document.getElementById("apiKeyInput").value.trim();
  store.set("anchor_api_key", apiKey);
  document.getElementById("keyModal").classList.remove("active");
}
if (!apiKey) openKeyModal();

// ================= NAV =================
document.querySelectorAll(".nav-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.screen).classList.add("active");
    if (btn.dataset.screen === "moodScreen") renderMoodHistory();
  });
});

// ================= STREAK =================
function renderStreak() {
  const bar = document.getElementById("streakBar");
  const last7 = [...Array(7)].map((_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (6 - i));
    return d.toDateString();
  });
  bar.innerHTML = last7.map(d =>
    `<div class="streak-dot ${streakDates.includes(d) ? 'filled' : ''}"></div>`
  ).join("") + `<div class="streak-label">${streakDates.filter(d => last7.includes(d)).length}/7 DAYS</div>`;
}
function markStreakToday() {
  const today = new Date().toDateString();
  if (!streakDates.includes(today)) {
    streakDates.push(today);
    store.set("anchor_streak", streakDates);
  }
  renderStreak();
}

// ================= CHAT =================
function renderChat() {
  const log = document.getElementById("chatLog");
  if (messages.length === 0) {
    log.innerHTML = `<div class="msg assistant"><div class="msg-text">Hey. I'm Anchor — here for the stretch you're in right now. What's on your mind today?</div></div>`;
    return;
  }
  log.innerHTML = messages.map(m =>
    `<div class="msg ${m.role === 'user' ? 'user' : 'assistant'}"><div class="msg-text">${escapeHtml(m.content)}</div></div>`
  ).join("");
  log.scrollTop = log.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if (!text) return;
  if (!apiKey) { openKeyModal(); return; }
  input.value = "";

  messages.push({ role: "user", content: text });
  store.set("anchor_messages", messages);
  renderChat();
  markStreakToday();

  const log = document.getElementById("chatLog");
  const loading = document.createElement("div");
  loading.className = "msg assistant";
  loading.innerHTML = `<div class="msg-text">...</div>`;
  log.appendChild(loading);
  log.scrollTop = log.scrollHeight;

  try {
    const reply = await callGemini(messages.slice(-10), "chat");
    messages.push({ role: "assistant", content: reply });
    store.set("anchor_messages", messages);
    renderChat();
  } catch (e) {
    loading.querySelector(".msg-text").textContent = "Couldn't reach the server — check your API key.";
  }
}

document.getElementById("chatInput").addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

// ================= CHECK-IN =================
async function getCheckin() {
  if (!apiKey) { openKeyModal(); return; }
  const el = document.getElementById("checkinText");
  el.textContent = "Thinking...";
  try {
    const reply = await callGemini(messages.slice(-10), "checkin");
    el.textContent = reply;
    messages.push({ role: "assistant", content: reply });
    store.set("anchor_messages", messages);
    markStreakToday();
  } catch (e) {
    el.textContent = "Couldn't reach the server — check your API key.";
  }
}

// ================= MOOD =================
function logMood(mood, emoji) {
  moods.unshift({ mood, emoji, time: new Date().toISOString() });
  moods = moods.slice(0, 30);
  store.set("anchor_moods", moods);
  markStreakToday();
  renderMoodHistory();
}
function renderMoodHistory() {
  const el = document.getElementById("moodHistory");
  if (moods.length === 0) {
    el.innerHTML = `<div class="empty-state">No entries yet — tap a face above to log one.</div>`;
    return;
  }
  el.innerHTML = moods.slice(0, 14).map(m =>
    `<div class="mood-entry"><span>${m.emoji}</span><span>${new Date(m.time).toLocaleDateString()} ${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>`
  ).join("");
}

// ================= GEMINI API CALL =================
async function callGemini(history, mode) {
  const systemPrompts = {
    chat: `You are Anchor, a warm, grounded daily companion for ${NICHE_CONTEXT}. Keep replies short (2-4 sentences), specific to what they said, never generic. Ask one gentle follow-up question. No motivational quotes.`,
    checkin: `You are Anchor, a daily companion for ${NICHE_CONTEXT}. Generate today's check-in message based on the recent conversation. Keep it short (2-3 sentences), warm, specific — reference something real from recent messages if possible. End with one light question.`
  };

  const contents = history.map(m => ({
    role: m.role === "assistant" ? "model" : "user",
    parts: [{ text: m.content }]
  }));

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents,
        systemInstruction: { parts: [{ text: systemPrompts[mode] }] }
      })
    }
  );

  if (!res.ok) {
    const errData = await res.json().catch(() => ({}));
    throw new Error(errData?.error?.message || "API error");
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ================= INIT =================
renderStreak();
renderChat();
renderMoodHistory();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
