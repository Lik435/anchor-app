<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Anchor</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#121214">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Anchor">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23121214'/><circle cx='50' cy='50' r='18' stroke='%238A9AAB' stroke-width='6' fill='none'/></svg>">

  <!-- Minimal PWA Manifest Injection -->
  <script>
    const manifest = {
      name: "Anchor",
      short_name: "Anchor",
      start_url: "./",
      display: "standalone",
      background_color: "#121214",
      theme_color: "#121214",
      icons: [{
        src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23121214'/><circle cx='50' cy='50' r='18' stroke='%238A9AAB' stroke-width='6' fill='none'/></svg>",
        sizes: "192x192 512x512",
        type: "image/svg+xml"
      }]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const manifestUrl = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestUrl;
    document.head.appendChild(link);
  </script>

  <style>
    :root {
      --bg: #F9F9FB;
      --surface: #FFFFFF;
      --surface-border: #E4E4E7;
      --text: #18181B;
      --text-muted: #71717A;
      --accent: #4A5D6E;
      --accent-light: #F0F4F8;
      --user-msg: #F4F4F5;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #121214;
      --surface: #18181B;
      --surface-border: #27272A;
      --text: #F4F4F5;
      --text-muted: #A1A1AA;
      --accent: #8A9AAB;
      --accent-light: #1E262E;
      --user-msg: #27272A;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      height: -webkit-fill-available;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    /* Header */
    header {
      padding: 16px 20px 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--surface-border);
      background: var(--bg);
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* Streak Indicator */
    .streak-container {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .streak-dot-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .streak-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1.5px solid var(--text-muted);
      background: transparent;
    }

    .streak-dot.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .streak-day {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      padding: 4px;
      font-family: var(--font);
    }

    /* Navigation Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--surface-border);
      background: var(--bg);
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    /* Main View Area */
    .view-content {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .tab-view {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .tab-view.active {
      display: flex;
    }

    /* Top Action Bar for Daily Check-in */
    .daily-bar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--surface-border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .daily-bar-text {
      font-size: 13px;
      color: var(--text-muted);
    }

    .btn-secondary {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid transparent;
      padding: 6px 12px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: default;
    }

    /* Chat Screen */
    .chat-list {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .msg {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 14px;
      word-break: break-word;
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      color: var(--text);
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-msg);
      color: var(--text);
    }

    .msg.system {
      align-self: center;
      font-size: 12px;
      color: var(--text-muted);
      background: transparent;
      padding: 4px 8px;
    }

    /* Input Footer */
    .chat-input-area {
      padding: 12px 20px 20px 20px;
      background: var(--bg);
      border-top: 1px solid var(--surface-border);
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 4px 8px 4px 14px;
    }

    .chat-input {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 8px 0;
      outline: none;
    }

    .chat-input::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--accent);
      color: #FFF;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-left: 8px;
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    /* Mood Log Screen */
    .mood-view {
      padding: 20px;
      gap: 24px;
    }

    .mood-selector {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .mood-title {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .mood-options {
      display: flex;
      gap: 8px;
    }

    .mood-btn {
      flex: 1;
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
    }

    .mood-btn:active {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .mood-history-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .mood-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mood-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      font-size: 14px;
    }

    .mood-time {
      font-size: 12px;
      color: var(--text-muted);
    }

    .empty-state {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      padding: 24px 0;
    }

    /* Settings / Key Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 360px;
      padding: 20px;
    }

    .modal-h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal-p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .key-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      margin-bottom: 16px;
      outline: none;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: #FFF;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header>
      <div class="brand">
        <span class="title">Anchor</span>
      </div>

      <!-- Feature 4: 7-Day Streak Dot Row -->
      <div class="streak-container" id="streakContainer"></div>

      <div class="header-actions">
        <button class="icon-btn" id="themeToggleBtn" aria-label="Toggle Mode">Dark</button>
        <button class="icon-btn" id="keyConfigBtn" aria-label="API Key">Key</button>
      </div>
    </header>

    <!-- Navigation -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="chat">Chat</button>
      <button class="tab-btn" data-tab="mood">Mood Log</button>
    </nav>

    <div class="view-content">
      <!-- Chat Tab -->
      <section class="tab-view active" id="chatView">
        <!-- Feature 2: Daily Check-in Top Bar -->
        <div class="daily-bar">
          <span class="daily-bar-text" id="dailyBarStatus">Daily check-in available</span>
          <button class="btn-secondary" id="dailyCheckInBtn">Check In</button>
        </div>

        <!-- Feature 1: Chat Message Container -->
        <div class="chat-list" id="chatList"></div>

        <div class="chat-input-area">
          <div class="input-wrapper">
            <input type="text" class="chat-input" id="userInput" placeholder="Share what you're working on or feeling..." autocomplete="off">
            <button class="send-btn" id="sendBtn">Send</button>
          </div>
        </div>
      </section>

      <!-- Feature 3: Mood Log Tab -->
      <section class="tab-view mood-view" id="moodView">
        <div class="mood-selector">
          <div class="mood-title">How are you feeling right now?</div>
          <div class="mood-options">
            <button class="mood-btn" onclick="logMood('Good')">Good</button>
            <button class="mood-btn" onclick="logMood('Okay')">Okay</button>
            <button class="mood-btn" onclick="logMood('Low')">Low</button>
          </div>
        </div>

        <div>
          <div class="mood-history-title">Recent History</div>
          <div class="mood-list" id="moodList"></div>
        </div>
      </section>
    </div>
  </div>

  <!-- API Key Modal -->
  <div class="modal-overlay" id="keyModal">
    <div class="modal">
      <div class="modal-h2">Gemini API Key</div>
      <div class="modal-p">Enter your Gemini API key to enable AI responses. Your key is stored locally in your browser.</div>
      <input type="password" class="key-input" id="apiKeyInput" placeholder="AIzaSy...">
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeKeyModal()">Cancel</button>
        <button class="btn-primary" onclick="saveApiKey()">Save Key</button>
      </div>
    </div>
  </div>

  <script>
    // System Prompt enforcing behavioral rules exactly
    const SYSTEM_PROMPT = `You are Anchor, a daily AI companion for students preparing for exams and job interviews.
Rules for your responses:
- Be warm but not saccharine.
- Keep responses concise (2 to 4 sentences maximum).
- Always ask exactly one gentle follow-up question.
- Never use generic motivational quotes or platitudes.
- Address specifically what the user actually said.
- Help them break down preparation stress, study plans, or interview anxiety rationally.`;

    // State Management
    let state = {
      apiKey: localStorage.getItem('anchor_api_key') || '',
      theme: localStorage.getItem('anchor_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'),
      messages: JSON.parse(localStorage.getItem('anchor_messages') || '[]'),
      moods: JSON.parse(localStorage.getItem('anchor_moods') || '[]'),
      engagementDates: JSON.parse(localStorage.getItem('anchor_engagement') || '[]'),
      lastCheckIn: localStorage.getItem('anchor_last_checkin') || ''
    };

    // Initialize Theme
    document.documentElement.setAttribute('data-theme', state.theme);
    document.getElementById('themeToggleBtn').innerText = state.theme === 'dark' ? 'Light' : 'Dark';

    // Elements
    const chatList = document.getElementById('chatList');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const dailyCheckInBtn = document.getElementById('dailyCheckInBtn');
    const dailyBarStatus = document.getElementById('dailyBarStatus');
    const streakContainer = document.getElementById('streakContainer');
    const moodList = document.getElementById('moodList');
    const keyModal = document.getElementById('keyModal');
    const apiKeyInput = document.getElementById('apiKeyInput');

    // Startup Init
    window.addEventListener('DOMContentLoaded', () => {
      recordEngagement();
      renderStreak();
      renderChat();
      renderMoods();
      updateCheckInStatus();

      // Register Minimal Service Worker for PWA
      if ('serviceWorker' in navigator) {
        const swCode = `
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('activate', e => self.clients.claim());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
      }
    });

    // Theme Switch
    document.getElementById('themeToggleBtn').addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', state.theme);
      localStorage.setItem('anchor_theme', state.theme);
      document.getElementById('themeToggleBtn').innerText = state.theme === 'dark' ? 'Light' : 'Dark';
    });

    // Navigation Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById(e.target.dataset.tab + 'View').classList.add('active');
      });
    });

    // Engagement & Streak Logic (Feature 4)
    function recordEngagement() {
      const today = new Date().toISOString().split('T')[0];
      if (!state.engagementDates.includes(today)) {
        state.engagementDates.push(today);
        // Keep last 30 days maximum
        if (state.engagementDates.length > 30) state.engagementDates.shift();
        localStorage.setItem('anchor_engagement', JSON.stringify(state.engagementDates));
      }
    }

    function renderStreak() {
      streakContainer.innerHTML = '';
      const daysOfWeek = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      const today = new Date();
      
      // Render last 7 days ending today
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(today.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        const dayLabel = daysOfWeek[d.getDay()];
        const isActive = state.engagementDates.includes(dateStr);

        const wrapper = document.createElement('div');
        wrapper.className = 'streak-dot-wrapper';
        wrapper.innerHTML = `
          <div class="streak-dot ${isActive ? 'active' : ''}"></div>
          <span class="streak-day">${dayLabel}</span>
        `;
        streakContainer.appendChild(wrapper);
      }
    }

    // Chat Logic (Feature 1)
    function renderChat() {
      chatList.innerHTML = '';
      if (state.messages.length === 0) {
        chatList.innerHTML = `<div class="msg system">Anchor is ready. Start by sharing what you are studying or preparing for today.</div>`;
        return;
      }

      state.messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `msg ${msg.role === 'user' ? 'user' : 'ai'}`;
        div.innerText = msg.text;
        chatList.appendChild(div);
      });
      chatList.scrollTop = chatList.scrollHeight;
    }

    async function sendMessage(overridePrompt = null) {
      const text = overridePrompt || userInput.value.trim();
      if (!text) return;

      if (!state.apiKey) {
        openKeyModal();
        return;
      }

      if (!overridePrompt) {
        userInput.value = '';
        state.messages.push({ role: 'user', text });
        renderChat();
      }

      recordEngagement();
      renderStreak();

      sendBtn.disabled = true;
      dailyCheckInBtn.disabled = true;

      // Show temporary typing indicator
      const typingDiv = document.createElement('div');
      typingDiv.className = 'msg ai';
      typingDiv.id = 'typingIndicator';
      typingDiv.innerText = '...';
      chatList.appendChild(typingDiv);
      chatList.scrollTop = chatList.scrollHeight;

      // Maintain last 5-10 messages for context
      const contextMessages = state.messages.slice(-8);

      // Build Gemini API payload
      const contents = contextMessages.map(m => ({
        role: m.role === 'user' ? 'user' : 'model',
        parts: [{ text: m.text }]
      }));

      // If override prompt (e.g. daily check-in trigger) append as instruction
      if (overridePrompt) {
        contents.push({
          role: 'user',
          parts: [{ text: overridePrompt }]
        });
      }

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${state.apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: {
              parts: [{ text: SYSTEM_PROMPT }]
            },
            contents: contents
          })
        });

        const data = await response.json();
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();

        if (data.error) {
          alert(`Gemini API Error: ${data.error.message || 'Check your key'}`);
          if (data.error.code === 400 || data.error.status === 'UNAUTHENTICATED') {
            openKeyModal();
          }
        } else if (data.candidates && data.candidates[0].content) {
          const aiReply = data.candidates[0].content.parts[0].text.trim();
          state.messages.push({ role: 'ai', text: aiReply });
          localStorage.setItem('anchor_messages', JSON.stringify(state.messages));
          renderChat();
        }
      } catch (err) {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
        alert('Failed to connect to Gemini API. Please check network or API key.');
      } finally {
        sendBtn.disabled = false;
        dailyCheckInBtn.disabled = false;
      }
    }

    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    sendBtn.addEventListener('click', () => sendMessage());

    // Feature 2: Daily Check-in Logic
    function updateCheckInStatus() {
      const today = new Date().toISOString().split('T')[0];
      if (state.lastCheckIn === today) {
        dailyBarStatus.innerText = 'Completed for today';
        dailyCheckInBtn.disabled = true;
      } else {
        dailyBarStatus.innerText = 'Daily check-in available';
        dailyCheckInBtn.disabled = false;
      }
    }

    dailyCheckInBtn.addEventListener('click', () => {
      const today = new Date().toISOString().split('T')[0];
      state.lastCheckIn = today;
      localStorage.setItem('anchor_last_checkin', today);
      updateCheckInStatus();

      const prompt = `[SYSTEM INSTRUCTION: Generate today's personalized daily check-in message based on our recent history. Keep it concise (2-3 sentences), warm, specific to my study/interview prep, and end with one question.]`;
      sendMessage(prompt);
    });

    // Feature 3: Mood Log Logic
    window.logMood = function(level) {
      const now = new Date();
      const timeStr = now.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' · ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      const moodEntry = { level, time: timeStr };
      state.moods.unshift(moodEntry);
      if (state.moods.length > 50) state.moods.pop();

      localStorage.setItem('anchor_moods', JSON.stringify(state.moods));
      recordEngagement();
      renderStreak();
      renderMoods();
    };

    function renderMoods() {
      if (state.moods.length === 0) {
        moodList.innerHTML = `<div class="empty-state">No mood logged yet today.</div>`;
        return;
      }

      moodList.innerHTML = state.moods.map(m => `
        <div class="mood-item">
          <span>${m.level}</span>
          <span class="mood-time">${m.time}</span>
        </div>
      `).join('');
    }

    // Modal / API Key Management
    document.getElementById('keyConfigBtn').addEventListener('click', openKeyModal);

    function openKeyModal() {
      apiKeyInput.value = state.apiKey;
      keyModal.classList.add('active');
    }

    function closeKeyModal() {
      keyModal.classList.remove('active');
    }

    function saveApiKey() {
      const val = apiKeyInput.value.trim();
      state.apiKey = val;
      localStorage.setItem('anchor_api_key', val);
      closeKeyModal();
    }
  </script>
